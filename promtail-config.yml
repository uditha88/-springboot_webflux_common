# reads log from backend technology & send them to "Loki"
server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
# promtail writing logs to loki

scrape_configs:
  - job_name: springboot-apps
    static_configs:
      - targets:
          - localhost
        labels:
          job: springboot-logs
          __path__: /var/log/*.log
