version: "3.8"

services:
  nginx:
    image: nginx:alpine
    ports:
      - "8080:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - webflux
    networks:
      - spring_boot_docker_network_uditha

  webflux:
    image: uditha/spring_webflux:latest
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      # Configure Spring Boot to log to a file that Promtail can access
      LOGGING_FILE_NAME: /app/logs/spring-boot-app.log
      # Configure Zipkin/Jaeger export
      SPRING_APPLICATION_NAME: webflux
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://jaeger:4318/v1/traces
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: 1.0
    volumes:
      - ./logs:/app/logs # Mount a local logs directory to the container
    networks:
      - spring_boot_docker_network_uditha

  webflux2:
    image: uditha/spring_webflux_2:latest
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: 8082
      # Configure Spring Boot to log to a file that Promtail can access
      LOGGING_FILE_NAME: /app/logs/spring-boot-app2.log
      # Configure Zipkin/Jaeger export
      SPRING_APPLICATION_NAME: webflux2
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://jaeger:4318/v1/traces
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: 1.0
    volumes:
      - ./logs:/app/logs # Mount a local logs directory to the container
    networks:
      - spring_boot_docker_network_uditha

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8180:8080"
    networks:
      - spring_boot_docker_network_uditha
    # URL to access" http://127.0.0.1:8180
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      # prometheus.yml used to define the apps that supply data to prometheus
    ports:
      - "9090:9090"
    networks:
      - spring_boot_docker_network_uditha

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      # login to grafana admin/admin and add prometheus service (datasource->prometheus) url to get vizualization
      # note sometimes incognito needed
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    networks:
      - spring_boot_docker_network_uditha

  loki:
    image: grafana/loki:latest
    # once had a issue an old  version had a connection issue from grafana. so used latest
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - loki-data:/loki
    networks:
      - spring_boot_docker_network_uditha
  # to test in browser: http://localhost:3100/ready
  # then add "loki" under "Explorer" in Grafana
  # the below promtail is the tool that reads log from bacend technology & send them to "Loki"
  promtail:
    image: grafana/promtail:2.4.1
    volumes:
      - ./promtail-config.yml:/etc/promtail/config.yml:ro
      # Mount the shared log directory so promtail can read the application logs
      - ./logs:/var/log
    depends_on:
      - loki
    networks:
      - spring_boot_docker_network_uditha

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - spring_boot_docker_network_uditha

  kafka:
    image: confluentinc/cp-kafka:7.4.1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    networks:
      - spring_boot_docker_network_uditha

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686" # Jaeger UI access via http://localhost:16686/search
      - "14268:14268"
      - "14250:14250"
      - "9411:9411" # Zipkin compatible endpoint
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
    environment:
      - COLLECTOR_ZIPKIN_HOST_PORT=:9411
    networks:
      - spring_boot_docker_network_uditha

volumes:
  loki-data:

networks:
  spring_boot_docker_network_uditha:
    driver: bridge
